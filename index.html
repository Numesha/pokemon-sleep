<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ポケスリ食材厳選ロードマップ</title><style>
:root{--bg:#f6f7f2;--ink:#24313a;--muted:#687984;--line:#dce4df;--panel:#fff;--done:#cfeee1;--done-ink:#20684f;--use:#d9eafd;--use-ink:#2b5f8e;--urgent:#f8d6dc;--urgent-ink:#a33b51;--field:#fff0bd;--shadow:0 12px 32px rgba(31,45,50,.08)}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}button,input,select{font:inherit}button{border:0;cursor:pointer}header{border-bottom:1px solid var(--line);background:linear-gradient(135deg,#e1f4e9,#fff1c4 52%,#dcecff)}.wrap{width:min(1220px,100%);margin:0 auto;padding:16px}.top{display:grid;gap:14px}.title-row{display:flex;align-items:end;justify-content:space-between;gap:12px}h1{margin:0;font-size:clamp(1.45rem,5vw,2.35rem);line-height:1.08;letter-spacing:0}.subtitle{margin:6px 0 0;color:var(--muted);font-size:.92rem}.badge{display:inline-flex;align-items:center;justify-content:center;min-height:32px;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.8);border:1px solid rgba(74,111,97,.2);color:#426459;font-size:.78rem;font-weight:850;white-space:nowrap}.toolbar{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(145px,.45fr) minmax(145px,.45fr) minmax(145px,.45fr);gap:10px}label{display:block;margin-bottom:5px;color:var(--muted);font-size:.75rem;font-weight:850}input,select{width:100%;min-height:44px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);outline:none}input:focus,select:focus{border-color:#67b990;box-shadow:0 0 0 3px rgba(103,185,144,.18)}main.wrap{display:grid;grid-template-columns:390px minmax(0,1fr);gap:14px;align-items:start}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);overflow:hidden}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 14px;border-bottom:1px solid #edf1ef}.panel-title{margin:0;font-size:.95rem}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px}.stat{min-width:0;padding:10px 8px;border:1px solid #e2e9e5;border-radius:8px;background:#f9fbfa}.stat b{display:block;font-size:1.3rem;line-height:1}.stat span{color:var(--muted);font-size:.72rem;font-weight:850}.ingredients{display:grid;gap:8px;padding:12px}.ingredient{display:grid;grid-template-columns:36px minmax(0,1fr);gap:9px;align-items:center;padding:10px;border:1px solid #e0e8e4;border-radius:8px;background:#fff}.ingredient.active{border-color:#67b990;box-shadow:0 0 0 3px rgba(103,185,144,.16)}.icon{width:36px;height:36px;display:grid;place-items:center;border-radius:8px;background:#f4f8f6;font-size:1.16rem}.ingredient-body{display:grid;gap:7px;min-width:0}.ingredient-top{display:flex;align-items:center;justify-content:space-between;gap:8px}.ingredient-name{min-width:0;padding:0;background:transparent;color:var(--ink);font-weight:950;text-align:left;overflow-wrap:anywhere}.ingredient select{min-height:36px;padding:6px 8px;font-size:.78rem;font-weight:850}.chips{display:flex;flex-wrap:wrap;gap:6px}.chip{border-radius:999px;padding:4px 8px;background:#edf1ef;color:#52635c;font-size:.72rem;font-weight:850}.chip.done{background:var(--done);color:var(--done-ink)}.chip.use{background:var(--use);color:var(--use-ink)}.chip.urgent{background:var(--urgent);color:var(--urgent-ink)}.chip.field{background:var(--field);color:#705b12}.tabs{display:flex;gap:6px;padding:6px;border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:2}.tab{flex:1;min-height:40px;border-radius:7px;background:transparent;color:var(--muted);font-weight:900}.tab.active{background:var(--use);color:var(--use-ink)}.content{padding:12px}.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}.card{min-width:0;overflow:hidden;border:1px solid #dfe8e4;border-radius:8px;background:#fff}.card-body{display:grid;gap:9px;padding:12px}.name-row{display:flex;align-items:start;justify-content:space-between;gap:8px}.pokemon-name{font-weight:950;font-size:1.02rem;overflow-wrap:anywhere}.sleep{padding:5px 8px;border-radius:999px;background:#eef3f1;color:#4e625a;font-size:.72rem;font-weight:900;white-space:nowrap}.slots{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid #edf1ef}.slot{min-width:0;padding:9px 7px;text-align:center;border-right:1px solid #edf1ef}.slot:last-child{border-right:0}.slot.hit{background:#effbf6}.slot strong{display:block;margin-bottom:4px;color:var(--muted);font-size:.7rem}.slot span{display:block;font-size:.8rem;font-weight:850;overflow-wrap:anywhere}.islands{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}.island{display:grid;gap:8px;padding:12px;border:1px solid #dfe8e4;border-radius:8px;background:#fff}.island h3{margin:0;font-size:.98rem}.score{font-size:1.55rem;line-height:1;font-weight:950}.actions{display:flex;flex-wrap:wrap;gap:8px;padding:0 12px 12px}.button{min-height:40px;padding:8px 11px;border-radius:8px;border:1px solid #cde5da;background:#eef6f2;color:#276b51;font-weight:900}.button.dark{border-color:#263a44;background:#263a44;color:#fff}.empty{padding:28px 12px;text-align:center;color:var(--muted);font-weight:850}.hidden{display:none!important}@media(max-width:900px){.toolbar{grid-template-columns:1fr 1fr}main.wrap{grid-template-columns:1fr}.ingredients{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:620px){.wrap{padding:12px}.title-row{align-items:start;flex-direction:column}.toolbar{grid-template-columns:1fr}.ingredients{grid-template-columns:1fr}.ingredient-top{align-items:stretch;flex-direction:column}.cards{grid-template-columns:1fr}}
</style></head><body><header><div class="wrap top"><div class="title-row"><div><h1>ポケスリ食材厳選ロードマップ</h1><p class="subtitle">AAA / ABB個体だけを対象に、食材ごとの厳選状況と行く島を確認。</p></div><span class="badge">仮データ版・食材得意のみ</span></div><div class="toolbar"><div><label for="search">検索</label><input id="search" type="search" placeholder="食材・ポケモン・島・睡眠タイプ"></div><div><label for="statusFilter">厳選状況</label><select id="statusFilter"><option value="all">すべて</option><option value="urgent">至急厳選必要</option><option value="use">妥協個体使用中</option><option value="done">厳選終了</option><option value="unset">未設定</option></select></div><div><label for="fieldFilter">出現フィールド</label><select id="fieldFilter"><option value="all">すべての島</option></select></div><div><label for="sleepFilter">睡眠タイプ</label><select id="sleepFilter"><option value="all">すべて</option><option>うとうと</option><option>すやすや</option><option>ぐっすり</option></select></div></div></div></header><main class="wrap"><aside class="panel"><div class="panel-head"><h2 class="panel-title">食材の状況</h2><button id="resetStatus" class="button" type="button">初期化</button></div><div class="stats"><div class="stat"><b id="urgentCount">0</b><span>至急</span></div><div class="stat"><b id="useCount">0</b><span>妥協</span></div><div class="stat"><b id="doneCount">0</b><span>終了</span></div></div><div id="ingredientList" class="ingredients"></div></aside><section class="panel"><div class="tabs"><button class="tab active" type="button" data-tab="pokemon">候補ポケモン</button><button class="tab" type="button" data-tab="island">行く島</button></div><div id="pokemonTab" class="content"><div id="pokemonCards" class="cards"></div><div id="emptyPokemon" class="empty hidden">条件に合う候補がありません。</div></div><div id="islandTab" class="content hidden"><div id="islandCards" class="islands"></div></div><div class="actions"><button id="showUrgent" class="button dark" type="button">至急食材だけ見る</button><button id="clearFilters" class="button" type="button">絞り込み解除</button></div></section></main><script>
const ingredients=[["apple","とくせんリンゴ","🍎"],["milk","モーモーミルク","🥛"],["sausage","マメミート","🥩"],["egg","とくせんエッグ","🥚"],["ginger","あったかジンジャー","🫚"],["mushroom","あじわいキノコ","🍄"],["tomato","あんみんトマト","🍅"],["cacao","リラックスカカオ","🍫"],["oil","ピュアなオイル","🫙"],["soy","ワカクサ大豆","🫘"],["honey","あまいミツ","🍯"],["leek","ふといながねぎ","🌱"],["tail","おいしいシッポ","〰️"],["potato","ほっこりポテト","🥔"],["corn","ワカクサコーン","🌽"],["coffee","めざましコーヒー","☕"]];
const pokemonBase=[{name:"フシギダネ",sleep:"うとうと",fields:["ワカクサ本島","シアンの砂浜","ラピスラズリ湖畔"],a:"honey",b:"tomato",c:"potato"},{name:"ヒトカゲ",sleep:"すやすや",fields:["ワカクサ本島","トープ洞窟"],a:"sausage",b:"ginger",c:"ginger"},{name:"ゼニガメ",sleep:"ぐっすり",fields:["ワカクサ本島","シアンの砂浜"],a:"milk",b:"cacao",c:"sausage"},{name:"ディグダ",sleep:"すやすや",fields:["ワカクサ本島","トープ洞窟"],a:"tomato",b:"leek",c:"soy"},{name:"イシツブテ",sleep:"ぐっすり",fields:["ワカクサ本島","トープ洞窟"],a:"soy",b:"potato",c:"mushroom"},{name:"ゴース",sleep:"うとうと",fields:["ワカクサ本島","トープ洞窟"],a:"ginger",b:"mushroom",c:"oil"},{name:"ガルーラ",sleep:"すやすや",fields:["ワカクサ本島"],a:"ginger",b:"potato",c:"soy"},{name:"メタモン",sleep:"すやすや",fields:["ワカクサ本島","シアンの砂浜","トープ洞窟","ウノハナ雪原"],a:"oil",b:"leek",c:"tail"},{name:"カイロス",sleep:"うとうと",fields:["ワカクサ本島","ラピスラズリ湖畔"],a:"honey",b:"apple",c:"sausage"},{name:"アブソル",sleep:"うとうと",fields:["ワカクサ本島","ウノハナ雪原"],a:"cacao",b:"apple",c:"mushroom"},{name:"デリバード",sleep:"ぐっすり",fields:["ウノハナ雪原"],a:"egg",b:"apple",c:"cacao"},{name:"ユキカブリ",sleep:"ぐっすり",fields:["ウノハナ雪原"],a:"tomato",b:"egg",c:"mushroom"},{name:"ヌイコグマ",sleep:"すやすや",fields:["ラピスラズリ湖畔"],a:"corn",b:"sausage",c:"egg"},{name:"ウッウ",sleep:"ぐっすり",fields:["シアンの砂浜"],a:"oil",b:"potato",c:"leek"},{name:"ニャオハ",sleep:"うとうと",fields:["ラピスラズリ湖畔"],a:"potato",b:"milk",c:"ginger"},{name:"ホゲータ",sleep:"すやすや",fields:["トープ洞窟"],a:"apple",b:"ginger",c:"sausage"},{name:"クワッス",sleep:"ぐっすり",fields:["シアンの砂浜"],a:"soy",b:"leek",c:"oil"},{name:"ウパー",sleep:"ぐっすり",fields:["シアンの砂浜"],a:"mushroom",b:"potato",c:"oil"},{name:"コリンク",sleep:"すやすや",fields:["ゴールド旧発電所"],a:"coffee",b:"oil",c:"tomato"},{name:"ココドラ",sleep:"ぐっすり",fields:["ゴールド旧発電所"],a:"sausage",b:"coffee",c:"soy"}];
const patterns=[{key:"AAA",slots:p=>[p.a,p.a,p.a]},{key:"ABB",slots:p=>[p.a,p.b,p.b]}],pokemon=pokemonBase.flatMap(base=>patterns.map(pattern=>({...base,pattern:pattern.key,label:`${base.name} ${pattern.key}`,slots:pattern.slots(base)}))),ingredientInfo=new Map(ingredients.map(([id,name,icon])=>[id,{name,icon}])),defaultStatus=Object.fromEntries(ingredients.map(([id])=>[id,"unset"]));let status={...defaultStatus,...JSON.parse(localStorage.getItem("ingredientStatusAaAbb")||"{}")},selectedIngredient="",activeTab="pokemon";const statusLabels={unset:"未設定",done:"厳選終了",use:"妥協個体使用中",urgent:"至急厳選必要"},$=id=>document.getElementById(id),nameOf=id=>ingredientInfo.get(id)?.name||id,iconOf=id=>ingredientInfo.get(id)?.icon||"•",statusClass=value=>value==="done"?"done":value==="use"?"use":value==="urgent"?"urgent":"";
function saveStatus(){localStorage.setItem("ingredientStatusAaAbb",JSON.stringify(status))}function fillFields(){[...new Set(pokemonBase.flatMap(p=>p.fields))].sort((a,b)=>a.localeCompare(b,"ja")).forEach(field=>$("fieldFilter").add(new Option(field,field)))}function renderIngredients(){$("ingredientList").innerHTML=ingredients.map(([id,name,icon])=>{const candidates=pokemon.filter(p=>p.slots.includes(id)),fields=[...new Set(candidates.flatMap(p=>p.fields))];return `<div class="ingredient ${selectedIngredient===id?"active":""}"><button class="icon" type="button" data-pick="${id}" title="${name}を見る">${icon}</button><div class="ingredient-body"><div class="ingredient-top"><button class="ingredient-name" type="button" data-pick="${id}">${name}</button><select data-status="${id}">${Object.entries(statusLabels).map(([value,label])=>`<option value="${value}" ${status[id]===value?"selected":""}>${label}</option>`).join("")}</select></div><div class="chips"><span class="chip ${statusClass(status[id])}">${statusLabels[status[id]]}</span><span class="chip">${candidates.length}候補</span><span class="chip field">${fields.length}島</span></div></div></div>`}).join("");$("urgentCount").textContent=ingredients.filter(([id])=>status[id]==="urgent").length;$("useCount").textContent=ingredients.filter(([id])=>status[id]==="use").length;$("doneCount").textContent=ingredients.filter(([id])=>status[id]==="done").length}
function activeIngredientIds(){const f=$("statusFilter").value;return ingredients.map(([id])=>id).filter(id=>!selectedIngredient||id===selectedIngredient).filter(id=>f==="all"||status[id]===f)}function filteredPokemon(){const q=$("search").value.trim().toLowerCase(),field=$("fieldFilter").value,sleep=$("sleepFilter").value,activeIds=activeIngredientIds();return pokemon.filter(p=>p.slots.some(slot=>activeIds.includes(slot))).filter(p=>field==="all"||p.fields.includes(field)).filter(p=>sleep==="all"||p.sleep===sleep).filter(p=>!q||[p.name,p.pattern,p.sleep,...p.fields,...p.slots.map(nameOf)].join(" ").toLowerCase().includes(q)).sort((a,b)=>b.slots.filter(s=>status[s]==="urgent").length-a.slots.filter(s=>status[s]==="urgent").length||a.name.localeCompare(b.name,"ja")||a.pattern.localeCompare(b.pattern))}
function renderPokemon(){const activeIds=activeIngredientIds(),list=filteredPokemon();$("pokemonCards").innerHTML=list.map(p=>`<article class="card"><div class="card-body"><div class="name-row"><div class="pokemon-name">${p.label}</div><span class="sleep">${p.sleep}</span></div><div class="chips"><span class="chip ${p.pattern==="AAA"?"done":"use"}">${p.pattern}</span>${p.fields.map(field=>`<span class="chip field">${field}</span>`).join("")}</div></div><div class="slots">${p.slots.map((slot,i)=>`<div class="slot ${activeIds.includes(slot)?"hit":""}"><strong>Lv.${i===0?"1":i===1?"30":"60"}</strong><span>${iconOf(slot)} ${nameOf(slot)}</span></div>`).join("")}</div></article>`).join("");$("emptyPokemon").classList.toggle("hidden",list.length>0)}
function renderIslands(){const activeIds=activeIngredientIds(),q=$("search").value.trim().toLowerCase(),sleep=$("sleepFilter").value,fieldFilter=$("fieldFilter").value,islandMap=new Map();pokemon.forEach(p=>{if(sleep!=="all"&&p.sleep!==sleep)return;if(fieldFilter!=="all"&&!p.fields.includes(fieldFilter))return;if(!p.slots.some(slot=>activeIds.includes(slot)))return;if(q&&![p.name,p.pattern,p.sleep,...p.fields,...p.slots.map(nameOf)].join(" ").toLowerCase().includes(q))return;p.fields.forEach(field=>{if(!islandMap.has(field))islandMap.set(field,{field,pokemon:[],urgent:0,use:0,done:0,ingredients:new Set});const item=islandMap.get(field);item.pokemon.push(p.label);p.slots.forEach(slot=>{if(!activeIds.includes(slot))return;item.ingredients.add(slot);if(status[slot]==="urgent")item.urgent+=1;if(status[slot]==="use")item.use+=1;if(status[slot]==="done")item.done+=1})})});const islands=[...islandMap.values()].sort((a,b)=>b.urgent-a.urgent||b.ingredients.size-a.ingredients.size||a.field.localeCompare(b.field,"ja"));$("islandCards").innerHTML=islands.map(island=>`<article class="island"><h3>${island.field}</h3><div class="score">${island.urgent}</div><div class="subtitle">至急食材ヒット数</div><div class="chips"><span class="chip urgent">至急 ${island.urgent}</span><span class="chip use">妥協 ${island.use}</span><span class="chip done">終了 ${island.done}</span></div><div class="chips">${[...island.ingredients].map(id=>`<span class="chip">${iconOf(id)} ${nameOf(id)}</span>`).join("")}</div><div class="subtitle">${[...new Set(island.pokemon)].slice(0,8).join("、")}</div></article>`).join("")||`<div class="empty">条件に合う島がありません。</div>`}
function renderAll(){renderIngredients();renderPokemon();renderIslands()}function clearFilters(){selectedIngredient="";$("search").value="";$("statusFilter").value="all";$("fieldFilter").value="all";$("sleepFilter").value="all";renderAll()}function init(){fillFields();renderAll();$("ingredientList").addEventListener("click",e=>{const pick=e.target.closest("[data-pick]");if(!pick)return;selectedIngredient=selectedIngredient===pick.dataset.pick?"":pick.dataset.pick;renderAll()});$("ingredientList").addEventListener("change",e=>{const select=e.target.closest("[data-status]");if(!select)return;status[select.dataset.status]=select.value;saveStatus();renderAll()});["search","statusFilter","fieldFilter","sleepFilter"].forEach(id=>{$(id).addEventListener("input",renderAll);$(id).addEventListener("change",renderAll)});document.querySelectorAll(".tab").forEach(button=>button.addEventListener("click",()=>{activeTab=button.dataset.tab;document.querySelectorAll(".tab").forEach(tab=>tab.classList.toggle("active",tab.dataset.tab===activeTab));$("pokemonTab").classList.toggle("hidden",activeTab!=="pokemon");$("islandTab").classList.toggle("hidden",activeTab!=="island")}));$("showUrgent").addEventListener("click",()=>{selectedIngredient="";$("statusFilter").value="urgent";renderAll()});$("clearFilters").addEventListener("click",clearFilters);$("resetStatus").addEventListener("click",()=>{status={...defaultStatus};saveStatus();renderAll()})}init();
</script></body></html>
