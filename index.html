function renderIconFilter(){$("iconFilter").innerHTML=orderedIngredients().map(([id])=>`<button class="filter-icon ${selectedFoods.has(id)?"active":""}" type="button" data-food-filter="${id}" title="${nameOf(id)}">${sprite(id)}</button>`).join("")}
function renderIngredients(){$("ingredientBody").classList.toggle("hidden",ingredientsCollapsed);$("toggleIngredients").textContent=ingredientsCollapsed?"展開する":"折りたたむ";$("ingredientList").innerHTML=orderedIngredients().map(([id,name])=>{const cs=usableCandidates().filter(c=>c.ingredient===id),fs=[...new Set(cs.flatMap(c=>c.fields))];return`<div class="ingredient ${selectedIngredient===id?"active":""}"><button class="icon" type="button" data-pick="${id}">${sprite(id)}</button><div class="ingredient-body"><div class="ingredient-top"><button class="ingredient-name" type="button" data-pick="${id}">${name}</button><div class="sort-actions"><button class="sort-btn" type="button" data-move="${id}" data-dir="-1">↑</button><button class="sort-btn" type="button" data-move="${id}" data-dir="1">↓</button></div><select data-status="${id}">${Object.entries(labels).map(([v,l])=>`<option value="${v}" ${status[id]===v?"selected":""}>${l}</option>`).join("")}</select></div><div class="chips"><span class="chip ${statusClass(status[id])}">${labels[status[id]]}</span><span class="chip">${cs.length}候補</span><span class="chip field">${fs.length}島</span></div></div></div>`}).join("");$("priorityCount").textContent=ingredients.filter(([id])=>status[id]==="priority").length;$("futureCount").textContent=ingredients.filter(([id])=>status[id]==="future").length;$("tempCount").textContent=ingredients.filter(([id])=>status[id]==="temp").length;$("doneCount").textContent=ingredients.filter(([id])=>status[id]==="done").length}
function renderPokemon(){const list=filtered();$("pokemonCards").innerHTML=list.map(c=>`<article class="card"><div class="card-body"><div class="name-row"><div class="pokemon-name">${c.mon} ${c.pattern}</div><span class="sleep">${c.sleep}</span></div><div class="chips"><span class="chip ${statusClass(status[c.ingredient])}">${spriteSmall(c.ingredient)} ${nameOf(c.ingredient)}</span>${c.fields.map(f=>`<span class="chip field">${f}</span>`).join("")}</div><button class="button danger" type="button" data-exclude="${c.id}">この候補を外す</button></div><div class="slots">${slotsFor(c).map((s,i)=>`<div class="slot ${s===c.ingredient?"hit":""}"><strong>Lv.${i===0?"1":i===1?"30":"60"}</strong><span>${s==="other"?"別食材":spriteSmall(s)+" "+nameOf(s)}</span></div>`).join("")}</div></article>`).join("");$("emptyPokemon").classList.toggle("hidden",list.length>0)}
function makeRows(reference){const ids=activeIds(),fieldFilter=$("fieldFilter").value,sleepFilter=$("sleepFilter").value,rows=[];Object.values(fieldMap).forEach(field=>Object.values(sleepMap).forEach(sleep=>{if(referenceFields.has(field)!==reference)return;if(fieldFilter!=="all"&&field!==fieldFilter)return;if(sleepFilter!=="all"&&sleep!==sleepFilter)return;const hits=usableCandidates().filter(c=>ids.includes(c.ingredient)&&c.fields.includes(field)&&c.sleep===sleep&&queryOk(c));const activeIng=[...new Set(hits.map(c=>c.ingredient))].filter(id=>status[id]!=="done");rows.push({field,sleep,hits,ing:activeIng,priority:activeIng.filter(id=>status[id]==="priority").length,future:activeIng.filter(id=>status[id]==="future").length,temp:activeIng.filter(id=>status[id]==="temp").length})}));return rows.sort((a,b)=>b.priority-a.priority||((b.future+b.temp)-(a.future+a.temp))||b.future-a.future||b.temp-a.temp||b.ing.length-a.ing.length||a.field.localeCompare(b.field,"ja")||a.sleep.localeCompare(b.sleep,"ja"))}
function foodLine(r,state){return r.ing.filter(id=>status[id]===state).map(id=>{const mons=r.hits.filter(c=>c.ingredient===id).map(c=>c.mon+" "+c.pattern);return`<span class="chip ${statusClass(state)}">${spriteSmall(id)} ${nameOf(id)}: ${[...new Set(mons)].join("、")}</span>`}).join("")||'<span class="chip">なし</span>'}
function renderRow(r){return`<article class="island"><h3>${r.field}</h3><div class="score">${r.priority}</div><div class="subtitle">${r.sleep} / 厳選最優先数</div><div class="chips"><span class="chip priority">最優先 ${r.priority}</span><span class="chip future">将来 ${r.future}</span><span class="chip temp">仮採用 ${r.temp}</span><span class="chip">${r.hits.length}候補</span></div><div class="group"><div class="group-title">厳選最優先</div><div class="chips">${foodLine(r,"priority")}</div></div><div class="group"><div class="group-title">将来厳選</div><div class="chips">${foodLine(r,"future")}</div></div><div class="group"><div class="group-title">仮採用</div><div class="chips">${foodLine(r,"temp")}</div></div></article>`}
function renderIslands(){const main=makeRows(false),ref=makeRows(true),shown=showAllIslands?main:main.slice(0,6);$("islandCards").innerHTML=shown.map(renderRow).join("");$("referenceCards").innerHTML=ref.map(renderRow).join("");$("toggleRest").textContent=showAllIslands?"島候補を上位6件に戻す":"島候補をすべて表示"}
function renderAll(){renderIconFilter();renderIngredients();renderPokemon();renderIslands()}
function clearFilters(){selectedIngredient="";selectedFoods=new Set;$("search").value="";$("statusFilter").value="all";$("fieldFilter").value="all";$("sleepFilter").value="all";save();renderAll()}
function init(){fillFields();renderAll();$("iconFilter").addEventListener("click",e=>{const b=e.target.closest("[data-food-filter]");if(!b)return;selectedFoods.has(b.dataset.foodFilter)?selectedFoods.delete(b.dataset.foodFilter):selectedFoods.add(b.dataset.foodFilter);save();renderAll()});$("ingredientList").addEventListener("click",e=>{const move=e.target.closest("[data-move]");if(move){moveIngredient(move.dataset.move,Number(move.dataset.dir));return}const p=e.target.closest("[data-pick]");if(!p)return;selectedIngredient=selectedIngredient===p.dataset.pick?"":p.dataset.pick;renderAll()});$("ingredientList").addEventListener("change",e=>{const s=e.target.closest("[data-status]");if(!s)return;status[s.dataset.status]=s.value;save();renderAll()});$("pokemonCards").addEventListener("click",e=>{const b=e.target.closest("[data-exclude]");if(!b)return;excluded.add(b.dataset.exclude);save();renderAll()});["search","modeFilter","statusFilter","fieldFilter","sleepFilter"].forEach(id=>{$(id).addEventListener("input",renderAll);$(id).addEventListener("change",renderAll)});document.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>{document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===b.dataset.tab));$("pokemonTab").classList.toggle("hidden",b.dataset.tab!=="pokemon");$("islandTab").classList.toggle("hidden",b.dataset.tab!=="island")}));$("showPriority").addEventListener("click",()=>{selectedIngredient="";$("statusFilter").value="priority";renderAll()});$("toggleRest").addEventListener("click",()=>{showAllIslands=!showAllIslands;renderIslands()});$("resetExcluded").addEventListener("click",()=>{excluded=new Set;save();renderAll()});$("resetOrder").addEventListener("click",()=>{ingredientOrder=[];save();renderAll()});$("toggleIngredients").addEventListener("click",()=>{ingredientsCollapsed=!ingredientsCollapsed;save();renderAll()});$("clearFilters").addEventListener("click",clearFilters)}
init();
</script></body></html>
