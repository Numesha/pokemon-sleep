<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ポケスリ食材厳選ロードマップ</title><link rel="icon" type="image/png" href="icon.png"><link rel="apple-touch-icon" href="icon.png"><meta name="theme-color" content="#e1f4e9"><style>
:root{--bg:#f6f7f2;--ink:#24313a;--muted:#687984;--line:#dce4df;--panel:#fff;--done:#cfeee1;--done-ink:#20684f;--use:#d9eafd;--use-ink:#2b5f8e;--urgent:#f8d6dc;--urgent-ink:#a33b51;--field:#fff0bd;--shadow:0 12px 32px rgba(31,45,50,.08)}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}button,input,select{font:inherit}button{border:0;cursor:pointer}header{border-bottom:1px solid var(--line);background:linear-gradient(135deg,#e1f4e9,#fff1c4 52%,#dcecff)}.wrap{width:min(1220px,100%);margin:0 auto;padding:16px}.top{display:grid;gap:14px}.title-row{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:12px;min-width:0}.app-icon{width:58px;height:58px;border-radius:14px;object-fit:cover;border:2px solid rgba(36,49,58,.18);box-shadow:0 8px 18px rgba(31,45,50,.14);flex:0 0 auto}h1{margin:0;font-size:clamp(1.35rem,5vw,2.2rem);line-height:1.08;letter-spacing:0}.subtitle{margin:6px 0 0;color:var(--muted);font-size:.92rem}.badge{display:inline-flex;align-items:center;justify-content:center;min-height:32px;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.8);border:1px solid rgba(74,111,97,.2);color:#426459;font-size:.78rem;font-weight:850;white-space:nowrap}.toolbar{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(145px,.45fr) minmax(145px,.45fr) minmax(145px,.45fr);gap:10px}label{display:block;margin-bottom:5px;color:var(--muted);font-size:.75rem;font-weight:850}input,select{width:100%;min-height:44px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);outline:none}input:focus,select:focus{border-color:#67b990;box-shadow:0 0 0 3px rgba(103,185,144,.18)}main.wrap{display:grid;grid-template-columns:390px minmax(0,1fr);gap:14px;align-items:start}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);overflow:hidden}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 14px;border-bottom:1px solid #edf1ef}.panel-title{margin:0;font-size:.95rem}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px}.stat{min-width:0;padding:10px 8px;border:1px solid #e2e9e5;border-radius:8px;background:#f9fbfa}.stat b{display:block;font-size:1.3rem;line-height:1}.stat span{color:var(--muted);font-size:.72rem;font-weight:850}.ingredients{display:grid;gap:8px;padding:12px}.ingredient{display:grid;grid-template-columns:36px minmax(0,1fr);gap:9px;align-items:center;padding:10px;border:1px solid #e0e8e4;border-radius:8px;background:#fff}.ingredient.active{border-color:#67b990;box-shadow:0 0 0 3px rgba(103,185,144,.16)}.icon{width:36px;height:36px;display:grid;place-items:center;border-radius:8px;background:#f4f8f6;font-size:1.16rem}.ingredient-body{display:grid;gap:7px;min-width:0}.ingredient-top{display:flex;align-items:center;justify-content:space-between;gap:8px}.ingredient-name{min-width:0;padding:0;background:transparent;color:var(--ink);font-weight:950;text-align:left;overflow-wrap:anywhere}.ingredient select{min-height:36px;padding:6px 8px;font-size:.78rem;font-weight:850}.chips{display:flex;flex-wrap:wrap;gap:6px}.chip{border-radius:999px;padding:4px 8px;background:#edf1ef;color:#52635c;font-size:.72rem;font-weight:850}.chip.done{background:var(--done);color:var(--done-ink)}.chip.use{background:var(--use);color:var(--use-ink)}.chip.urgent{background:var(--urgent);color:var(--urgent-ink)}.chip.field{background:var(--field);color:#705b12}.tabs{display:flex;gap:6px;padding:6px;border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:2}.tab{flex:1;min-height:40px;border-radius:7px;background:transparent;color:var(--muted);font-weight:900}.tab.active{background:var(--use);color:var(--use-ink)}.content{padding:12px}.cards,.islands{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}.card,.island{min-width:0;overflow:hidden;border:1px solid #dfe8e4;border-radius:8px;background:#fff}.card-body,.island{display:grid;gap:9px;padding:12px}.name-row{display:flex;align-items:start;justify-content:space-between;gap:8px}.pokemon-name{font-weight:950;font-size:1.02rem;overflow-wrap:anywhere}.sleep{padding:5px 8px;border-radius:999px;background:#eef3f1;color:#4e625a;font-size:.72rem;font-weight:900;white-space:nowrap}.slots{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid #edf1ef}.slot{min-width:0;padding:9px 7px;text-align:center;border-right:1px solid #edf1ef}.slot:last-child{border-right:0}.slot.hit{background:#effbf6}.slot strong{display:block;margin-bottom:4px;color:var(--muted);font-size:.7rem}.slot span{display:block;font-size:.8rem;font-weight:850;overflow-wrap:anywhere}.score{font-size:1.55rem;line-height:1;font-weight:950}.actions{display:flex;flex-wrap:wrap;gap:8px;padding:0 12px 12px}.button{min-height:40px;padding:8px 11px;border-radius:8px;border:1px solid #cde5da;background:#eef6f2;color:#276b51;font-weight:900}.button.dark{border-color:#263a44;background:#263a44;color:#fff}.empty{padding:28px 12px;text-align:center;color:var(--muted);font-weight:850}.hidden{display:none!important}@media(max-width:900px){.toolbar{grid-template-columns:1fr 1fr}main.wrap{grid-template-columns:1fr}.ingredients{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:620px){.wrap{padding:12px}.title-row{align-items:start;flex-direction:column}.brand{align-items:flex-start}.app-icon{width:52px;height:52px}.toolbar{grid-template-columns:1fr}.ingredients{grid-template-columns:1fr}.ingredient-top{align-items:stretch;flex-direction:column}.cards,.islands{grid-template-columns:1fr}}
</style></head><body><header><div class="wrap top"><div class="title-row"><div class="brand"><img class="app-icon" src="icon.png" alt="" onerror="this.style.display='none'"><div><h1>ポケスリ食材厳選ロードマップ</h1><p class="subtitle">確定データ版。対象はAAA / ABB、しっぽのみ例外あり。</p></div></div><span class="badge">食材得意・2枠以上候補</span></div><div class="toolbar"><div><label for="search">検索</label><input id="search" type="search" placeholder="食材・ポケモン・島・睡眠タイプ"></div><div><label for="statusFilter">厳選状況</label><select id="statusFilter"><option value="all">すべて</option><option value="urgent">至急厳選必要</option><option value="use">妥協個体使用中</option><option value="done">厳選終了</option><option value="unset">未設定</option></select></div><div><label for="fieldFilter">出現フィールド</label><select id="fieldFilter"><option value="all">すべての島</option></select></div><div><label for="sleepFilter">睡眠タイプ</label><select id="sleepFilter"><option value="all">すべて</option><option>うとうと</option><option>すやすや</option><option>ぐっすり</option></select></div></div></div></header><main class="wrap"><aside class="panel"><div class="panel-head"><h2 class="panel-title">食材の状況</h2><button id="resetStatus" class="button" type="button">初期化</button></div><div class="stats"><div class="stat"><b id="urgentCount">0</b><span>至急</span></div><div class="stat"><b id="useCount">0</b><span>妥協</span></div><div class="stat"><b id="doneCount">0</b><span>終了</span></div></div><div id="ingredientList" class="ingredients"></div></aside><section class="panel"><div class="tabs"><button class="tab active" type="button" data-tab="pokemon">候補ポケモン</button><button class="tab" type="button" data-tab="island">行く島</button></div><div id="pokemonTab" class="content"><div id="pokemonCards" class="cards"></div><div id="emptyPokemon" class="empty hidden">条件に合う候補がありません。</div></div><div id="islandTab" class="content hidden"><div id="islandCards" class="islands"></div></div><div class="actions"><button id="showUrgent" class="button dark" type="button">至急食材だけ見る</button><button id="toggleRest" class="button" type="button">島候補をすべて表示</button><button id="clearFilters" class="button" type="button">絞り込み解除</button></div></section></main><script>
const ingredients=[["sausage","まめミート","🥩"],["egg","とくせんエッグ","🥚"],["ginger","あったかジンジャー","🫚"],["mushroom","あじわいキノコ","🍄"],["tomato","あんみんトマト","🍅"],["cacao","リラックスカカオ","🍫"],["oil","ピュアなオイル","🫙"],["soy","ワカクサ大豆","🫘"],["honey","あまいミツ","🍯"],["leek","ふといながねぎ","🌱"],["potato","ほっこりポテト","🥔"],["corn","ワカクサコーン","🌽"],["coffee","めざましコーヒー","☕"],["herb","げきからハーブ","🌿"],["pumpkin","ずっしりカボチャ","🎃"],["avocado","つやつやアボカド","🥑"],["milk","モーモーミルク","🥛"],["apple","とくせんリンゴ","🍎"],["tail","おいしいシッポ","〰️"]];
const fieldMap={1:"ワカクサ本島",2:"シアンの砂浜",3:"トープ洞窟",4:"ウノハナ雪原",5:"ラピスラズリ湖畔",6:"ゴールド旧発電所",7:"アンバー渓谷",8:"ワカクサ本島EX"},sleepMap={A:"うとうと",B:"すやすや",C:"ぐっすり"};
const pokemonInfo={"フシギダネ":{f:[1,5,8],s:"A"},"ヒトカゲ":{f:[1,3,8],s:"B"},"ゼニガメ":{f:[1,2,8],s:"C"},"ディグダ":{f:[1,3],s:"B"},"マタツボミ":{f:[1,2,5],s:"A"},"イシツブテ":{f:[1,3],s:"C"},"ゴース":{f:[1,3,6],s:"A"},"ガルーラ":{f:[1,2,8],s:"B"},"カイロス":{f:[1,2,7,8],s:"A"},"メタモン":{f:[1,2,3,4,5,6,7,8],s:"B"},"ヨーギラス":{f:[1,3,7,8],s:"C"},"アブソル":{f:[1,4,8],s:"A"},"グレッグル":{f:[1,2],s:"A"},"マネネ":{f:[2],s:"C"},"デリバード":{f:[1,4,8],s:"A"},"ユキカブリ":{f:[4,8],s:"C"},"ミニリュウ":{f:[5],s:"A"},"ヌイコグマ":{f:[5],s:"C"},"キュワワー":{f:[1,2,8],s:"B"},"ウッウ":{f:[1,2,4,8],s:"C"},"ニャオハ":{f:[1,5,8],s:"A"},"ホゲータ":{f:[1,2,3,8],s:"B"},"クワッス":{f:[1,5,8],s:"C"},"ウパー":{f:[1,2],s:"C"},"アゴジムシ":{f:[6],s:"A"},"コリンク":{f:[6],s:"B"},"ココドラ":{f:[6,8],s:"C"},"ウパー（パルデア）":{f:[1,3,8],s:"A"},"ピンプク":{f:[1,4,7,8],s:"C"},"クチート":{f:[1,6,7,8],s:"C"},"カモネギ":{f:[1,2,6,8],s:"C"},"バケッチャ":{f:[1,6,8],s:"A"},"ナックラー":{f:[1,3,7],s:"C"},"ミカルゲ":{f:[1,4,7,8],s:"A"},"アルクジラ":{f:[1,4,8],s:"C"},"アブリー":{f:[1,2,8],s:"B"},"ジジーロン":{f:[1,5,7,8],s:"A"},"ヤドン":{f:[1,2],s:"B"}};
const raw=[["sausage","グレッグル","ABB"],["sausage","ホゲータ","ABB"],["sausage","カモネギ","ABB"],["sausage","アルクジラ","ABB"],["sausage","ヒトカゲ","AAA"],["sausage","ココドラ","AAA"],["sausage","ヌイコグマ","ABB"],["egg","ピンプク","AAA"],["egg","デリバード","AAA"],["egg","ユキカブリ","ABB"],["ginger","ヨーギラス","AAA"],["ginger","キュワワー","ABB"],["ginger","ガルーラ","AAA"],["ginger","ヒトカゲ","ABB"],["mushroom","ミカルゲ","AAA"],["mushroom","アゴジムシ","ABB"],["mushroom","ウパー","AAA"],["mushroom","ゴース","ABB"],["tomato","マタツボミ","AAA"],["tomato","コリンク","AAA"],["tomato","マネネ","AAA"],["tomato","ディグダ","AAA"],["tomato","ユキカブリ","AAA"],["tomato","フシギダネ","ABB"],["cacao","ウパー（パルデア）","AAA"],["cacao","アブソル","AAA"],["cacao","ゼニガメ","ABB"],["oil","グレッグル","AAA"],["oil","クチート","AAA"],["oil","アブリー","ABB"],["oil","メタモン","AAA"],["oil","ウッウ","AAA"],["oil","コリンク","ABB"],["soy","ジジーロン","AAA"],["soy","ヨーギラス","ABB"],["soy","バケッチャ","ABB"],["soy","イシツブテ","AAA"],["soy","クワッス","AAA"],["honey","アブリー","AAA"],["honey","フシギダネ","AAA"],["honey","カイロス","AAA"],["leek","カモネギ","AAA"],["leek","ディグダ","ABB"],["leek","メタモン","ABB"],["leek","クワッス","ABB"],["potato","アルクジラ","AAA"],["potato","マタツボミ","ABB"],["potato","マネネ","ABB"],["potato","ピンプク","ABB"],["potato","ニャオハ","AAA"],["potato","イシツブテ","ABB"],["potato","ガルーラ","ABB"],["potato","ウッウ","ABB"],["potato","ウパー","ABB"],["corn","キュワワー","AAA"],["corn","ミニリュウ","ABB"],["corn","クチート","ABB"],["corn","ヌイコグマ","AAA"],["coffee","アゴジムシ","AAA"],["coffee","ウパー（パルデア）","ABB"],["coffee","ココドラ","ABB"],["herb","ゴース","AAA"],["herb","ミニリュウ","AAA"],["herb","ナックラー","ABB"],["pumpkin","バケッチャ","AAA"],["pumpkin","ミカルゲ","ABB"],["avocado","ナックラー","AAA"],["avocado","ジジーロン","ABB"],["milk","ゼニガメ","AAA"],["milk","ニャオハ","ABB"],["apple","ホゲータ","AAA"],["apple","カイロス","ABB"],["apple","アブソル","ABB"],["apple","デリバード","ABB"],["tail","ヤドン","ABB"],["tail","メタモン","AAC"]];
const infoMap=new Map(ingredients.map(([id,name,icon])=>[id,{name,icon}])),defaultStatus=Object.fromEntries(ingredients.map(([id])=>[id,"unset"]));let status={...defaultStatus,...JSON.parse(localStorage.getItem("sleepFoodStatusFinal")||"{}")},selectedIngredient="",activeTab="pokemon",showAllIslands=false;const labels={unset:"未設定",done:"厳選終了",use:"妥協個体使用中",urgent:"至急厳選必要"},$=id=>document.getElementById(id),nameOf=id=>infoMap.get(id)?.name||id,iconOf=id=>infoMap.get(id)?.icon||"•",statusClass=v=>v==="done"?"done":v==="use"?"use":v==="urgent"?"urgent":"";
const candidates=raw.map(([ingredient,mon,pattern])=>{const info=pokemonInfo[mon]||{f:[],s:""};return{ingredient,mon,pattern,fields:info.f.map(n=>fieldMap[n]),sleep:sleepMap[info.s]||""}});
function slotsFor(c){if(c.pattern==="AAA")return[c.ingredient,c.ingredient,c.ingredient];if(c.pattern==="ABB")return["other",c.ingredient,c.ingredient];if(c.pattern==="AAC")return[c.ingredient,"other",c.ingredient];return["other",c.ingredient,c.ingredient]}
function save(){localStorage.setItem("sleepFoodStatusFinal",JSON.stringify(status))}
function fillFields(){Object.values(fieldMap).forEach(f=>$("fieldFilter").add(new Option(f,f)))}
function activeIds(){const f=$("statusFilter").value;return ingredients.map(([id])=>id).filter(id=>!selectedIngredient||id===selectedIngredient).filter(id=>f==="all"||status[id]===f)}
function queryOk(c){const q=$("search").value.trim().toLowerCase();if(!q)return true;return[c.mon,c.pattern,c.sleep,...c.fields,nameOf(c.ingredient)].join(" ").toLowerCase().includes(q)}
function filtered(){const ids=activeIds(),field=$("fieldFilter").value,sleep=$("sleepFilter").value;return candidates.filter(c=>ids.includes(c.ingredient)).filter(c=>field==="all"||c.fields.includes(field)).filter(c=>sleep==="all"||c.sleep===sleep).filter(queryOk).sort((a,b)=>(status[b.ingredient]==="urgent")-(status[a.ingredient]==="urgent")||(status[b.ingredient]==="use")-(status[a.ingredient]==="use")||a.mon.localeCompare(b.mon,"ja"))}
function renderIngredients(){$("ingredientList").innerHTML=ingredients.map(([id,name,icon])=>{const cs=candidates.filter(c=>c.ingredient===id),fs=[...new Set(cs.flatMap(c=>c.fields))];return`<div class="ingredient ${selectedIngredient===id?"active":""}"><button class="icon" type="button" data-pick="${id}">${icon}</button><div class="ingredient-body"><div class="ingredient-top"><button class="ingredient-name" type="button" data-pick="${id}">${name}</button><select data-status="${id}">${Object.entries(labels).map(([v,l])=>`<option value="${v}" ${status[id]===v?"selected":""}>${l}</option>`).join("")}</select></div><div class="chips"><span class="chip ${statusClass(status[id])}">${labels[status[id]]}</span><span class="chip">${cs.length}候補</span><span class="chip field">${fs.length}島</span></div></div></div>`}).join("");$("urgentCount").textContent=ingredients.filter(([id])=>status[id]==="urgent").length;$("useCount").textContent=ingredients.filter(([id])=>status[id]==="use").length;$("doneCount").textContent=ingredients.filter(([id])=>status[id]==="done").length}
function renderPokemon(){const list=filtered();$("pokemonCards").innerHTML=list.map(c=>`<article class="card"><div class="card-body"><div class="name-row"><div class="pokemon-name">${c.mon} ${c.pattern}</div><span class="sleep">${c.sleep}</span></div><div class="chips"><span class="chip ${statusClass(status[c.ingredient])}">${iconOf(c.ingredient)} ${nameOf(c.ingredient)}</span>${c.fields.map(f=>`<span class="chip field">${f}</span>`).join("")}</div></div><div class="slots">${slotsFor(c).map((s,i)=>`<div class="slot ${s===c.ingredient?"hit":""}"><strong>Lv.${i===0?"1":i===1?"30":"60"}</strong><span>${s==="other"?"別食材":iconOf(s)+" "+nameOf(s)}</span></div>`).join("")}</div></article>`).join("");$("emptyPokemon").classList.toggle("hidden",list.length>0)}
function renderIslands(){const ids=activeIds(),fieldFilter=$("fieldFilter").value,sleepFilter=$("sleepFilter").value,rows=[];Object.values(fieldMap).forEach(field=>Object.values(sleepMap).forEach(sleep=>{if(fieldFilter!=="all"&&field!==fieldFilter)return;if(sleepFilter!=="all"&&sleep!==sleepFilter)return;const hits=candidates.filter(c=>ids.includes(c.ingredient)&&c.fields.includes(field)&&c.sleep===sleep&&queryOk(c));const ing=[...new Set(hits.map(c=>c.ingredient))];rows.push({field,sleep,hits,ing,urgent:ing.filter(id=>status[id]==="urgent").length,use:ing.filter(id=>status[id]==="use").length,done:ing.filter(id=>status[id]==="done").length})}));rows.sort((a,b)=>b.urgent-a.urgent||b.use-a.use||b.ing.length-a.ing.length||a.field.localeCompare(b.field,"ja")||a.sleep.localeCompare(b.sleep,"ja"));const shown=showAllIslands?rows:rows.slice(0,6);$("islandCards").innerHTML=shown.map(r=>`<article class="island"><h3>${r.field}</h3><div class="score">${r.urgent}</div><div class="subtitle">${r.sleep} / 至急食材数</div><div class="chips"><span class="chip urgent">至急 ${r.urgent}</span><span class="chip use">妥協 ${r.use}</span><span class="chip done">終了 ${r.done}</span><span class="chip">${r.hits.length}候補</span></div><div class="chips">${r.ing.map(id=>`<span class="chip">${iconOf(id)} ${nameOf(id)}</span>`).join("")||'<span class="chip">該当なし</span>'}</div><div class="subtitle">${[...new Set(r.hits.map(c=>c.mon+" "+c.pattern))].slice(0,8).join("、")}</div></article>`).join("");$("toggleRest").textContent=showAllIslands?"島候補を上位6件に戻す":"島候補をすべて表示"}
function renderAll(){renderIngredients();renderPokemon();renderIslands()}
function clearFilters(){selectedIngredient="";$("search").value="";$("statusFilter").value="all";$("fieldFilter").value="all";$("sleepFilter").value="all";renderAll()}
function init(){fillFields();renderAll();$("ingredientList").addEventListener("click",e=>{const p=e.target.closest("[data-pick]");if(!p)return;selectedIngredient=selectedIngredient===p.dataset.pick?"":p.dataset.pick;renderAll()});$("ingredientList").addEventListener("change",e=>{const s=e.target.closest("[data-status]");if(!s)return;status[s.dataset.status]=s.value;save();renderAll()});["search","statusFilter","fieldFilter","sleepFilter"].forEach(id=>{$(id).addEventListener("input",renderAll);$(id).addEventListener("change",renderAll)});document.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>{activeTab=b.dataset.tab;document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===activeTab));$("pokemonTab").classList.toggle("hidden",activeTab!=="pokemon");$("islandTab").classList.toggle("hidden",activeTab!=="island")}));$("showUrgent").addEventListener("click",()=>{selectedIngredient="";$("statusFilter").value="urgent";renderAll()});$("toggleRest").addEventListener("click",()=>{showAllIslands=!showAllIslands;renderIslands()});$("clearFilters").addEventListener("click",clearFilters);$("resetStatus").addEventListener("click",()=>{status={...defaultStatus};save();renderAll()})}
init();
</script></body></html>
